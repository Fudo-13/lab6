<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit order</title>
</head>
<body>

<h1>Edit order</h1>

<form th:action="@{/orders/update/{id}(id=${order.id})}" method="post" th:object="${order}">
    <input type="text" th:field="*{customerName}" required>
    <input type="text" th:field="*{productName}" required>
    <input type="number" th:field="*{quantity}" required>
    <input type="number" step="0.1" th:field="*{price}" required>
    <button type="submit">Save</button>
</form>

<a th:href="@{/orders}">Back</a>

</body>
</html>
